<!DOCTYPE html>
<html>

<head>

    <title>West End Office Intelligence Platform</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body {
            font-family: Inter, Arial, sans-serif;
            background: #0b1120;
            color: #e5e7eb;
            margin: 0;
            padding: 32px;
        }

        .container {
            max-width: 1280px;
            margin: auto;
        }

        .header {
            margin-bottom: 35px;
        }

        .header h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.7;
            max-width: 900px;
            line-height: 1.7;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .selector {
            background: #111827;
            color: white;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }

        .card {
            background: linear-gradient(145deg, #111827, #1f2937);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 6px 25px rgba(0,0,0,0.25);
        }

        .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
            margin-bottom: 12px;
        }

        .value {
            font-size: 34px;
            font-weight: 700;
        }

        .signal-badge {
            display: inline-block;
            padding: 12px 18px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 700;
        }

        .chart-card {
            background: linear-gradient(145deg, #111827, #1e293b);
            border-radius: 22px;
            padding: 28px;
            margin-bottom: 28px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.25);
        }

        .section-title {
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .insight {
            background: linear-gradient(145deg, #111827, #1e293b);
            padding: 24px;
            border-left: 5px solid #3b82f6;
            border-radius: 18px;
            line-height: 1.8;
            font-size: 15px;
            color: #d1d5db;
        }

        canvas {
            max-height: 450px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="header">

        <h1>London West End Office Intelligence Platform</h1>

        <p>
            AI-assisted vacancy forecasting and investment analytics
            for key Central London office submarkets.
        </p>

    </div>

    <div class="topbar">

        <div>
            <div class="label">Selected Market</div>

            <select id="areaSelect" class="selector">

                <option>Soho</option>
                <option>Mayfair</option>
                <option>Fitzrovia</option>
                <option>Covent Garden</option>
                <option>Marylebone</option>

            </select>
        </div>

    </div>

    <!-- KPI GRID -->

    <div class="grid">

        <div class="card">
            <div class="label">Average Vacancy</div>
            <div class="value" id="avgVacancy">-</div>
        </div>

        <div class="card">
            <div class="label">Forecast Direction</div>
            <div class="value" id="trend">-</div>
        </div>

        <div class="card">
            <div class="label">Latest Forecast</div>
            <div class="value" id="latestForecast">-</div>
        </div>

        <div class="card">

            <div class="label">Investment Signal</div>

            <div id="signalBadge" class="signal-badge">
                Loading...
            </div>

        </div>

    </div>

    <!-- CHART -->

    <div class="chart-card">

        <div class="section-title">
            Vacancy Forecast Trend
        </div>

        <canvas id="chart"></canvas>

    </div>

    <!-- AI COMMENTARY -->

    <div class="insight" id="insight">

        Loading AI commentary...

    </div>

</div>

<script>

let chart;

async function loadDashboard(selectedArea = "Soho") {

    const response =
        await fetch('https://west-end-office-intelligence-production.up.railway.app/predictions');

    const data = await response.json();

    const filtered =
        data.filter(d => d.area === selectedArea);

    const years =
        filtered.map(d => d.year);

    const predictions =
        filtered.map(d => d.predicted);

    // KPI VALUES

    const avg =
        (predictions.reduce((a,b)=>a+b,0)/predictions.length)
        .toFixed(2);

    document.getElementById("avgVacancy").innerText =
        avg + "%";

    const trend =
        predictions[predictions.length - 1] < predictions[0]
        ? "Improving"
        : "Softening";

    document.getElementById("trend").innerText =
        trend;

    document.getElementById("latestForecast").innerText =
        predictions[predictions.length - 1].toFixed(2) + "%";

    // AI COMMENTARY

    document.getElementById("insight").innerText =

        `${selectedArea} currently demonstrates ` +

        `${trend.toLowerCase()} vacancy dynamics based on AI-assisted forecasting. ` +

        `Recent modelling indicates average vacancy levels of ${avg}% with ` +

        `evidence of occupier demand resilience across prime West End office stock. ` +

        `The submarket remains strategically important within the broader Central London office ecosystem.`;

    // SIGNAL BADGE

    const badge =
        document.getElementById("signalBadge");

    if (avg < 5) {

        badge.innerText = "STRONG MARKET";
        badge.style.background =
            "rgba(34,197,94,0.15)";
        badge.style.color =
            "#22c55e";

    }

    else if (avg < 7) {

        badge.innerText = "HOLD / MONITOR";
        badge.style.background =
            "rgba(250,204,21,0.15)";
        badge.style.color =
            "#facc15";

    }

    else {

        badge.innerText = "WEAKENING";
        badge.style.background =
            "rgba(239,68,68,0.15)";
        badge.style.color =
            "#ef4444";

    }

    // CHART

    if (chart) {
        chart.destroy();
    }

    chart = new Chart(
        document.getElementById('chart'),
        {

        type: 'line',

        data: {

            labels: years,

            datasets: [

                {
                    label: `${selectedArea} Vacancy Forecast`,
                    data: predictions,
                    borderColor: '#3b82f6',
                    tension: 0.35,
                    fill: false
                }

            ]
        },

        options: {

            responsive: true,

            plugins: {

                legend: {

                    labels: {
                        color: '#e5e7eb'
                    }
                }
            },

            scales: {

                x: {

                    ticks: {
                        color: '#9ca3af'
                    },

                    grid: {
                        color: 'rgba(255,255,255,0.05)'
                    }
                },

                y: {

                    ticks: {
                        color: '#9ca3af'
                    },

                    grid: {
                        color: 'rgba(255,255,255,0.05)'
                    }
                }
            }
        }
    });
}

// INITIAL LOAD

loadDashboard();

// DROPDOWN EVENT

document.getElementById("areaSelect")
.addEventListener("change", (e) => {

    loadDashboard(e.target.value);

});

</script>

</body>

</html>
